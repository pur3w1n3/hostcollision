name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test ./...

  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            goos: windows
            goarch: amd64
            binary: hostcollision.exe
          - name: linux-amd64
            goos: linux
            goarch: amd64
            binary: hostcollision
          - name: linux-arm64
            goos: linux
            goarch: arm64
            binary: hostcollision
          - name: macos-amd64
            goos: darwin
            goarch: amd64
            binary: hostcollision
          - name: macos-arm64
            goos: darwin
            goarch: arm64
            binary: hostcollision

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags="-s -w" -o dist/${{ matrix.name }}/${{ matrix.binary }} ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hostcollision-${{ matrix.name }}
          path: dist/${{ matrix.name }}/${{ matrix.binary }}
          if-no-files-found: error
