name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test ./...

  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            goos: windows
            goarch: amd64
            binary: hostcollision.exe
          - name: linux-amd64
            goos: linux
            goarch: amd64
            binary: hostcollision
          - name: linux-arm64
            goos: linux
            goarch: arm64
            binary: hostcollision
          - name: macos-amd64
            goos: darwin
            goarch: amd64
            binary: hostcollision
          - name: macos-arm64
            goos: darwin
            goarch: arm64
            binary: hostcollision

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags="-s -w" -o dist/${{ matrix.name }}/${{ matrix.binary }} ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: hostcollision-${{ matrix.name }}
          path: dist/${{ matrix.name }}/${{ matrix.binary }}
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          build() {
            local goos="$1"
            local goarch="$2"
            local output="$3"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags="-s -w" -o "dist/$output" ./cmd
          }

          build windows amd64 hostcollision-windows-amd64.exe
          build linux amd64 hostcollision-linux-amd64
          build linux arm64 hostcollision-linux-arm64
          build darwin amd64 hostcollision-macos-amd64
          build darwin arm64 hostcollision-macos-arm64

          sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --notes "Automated release for $TAG_NAME."
